name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS-based actions (checkout, setup-node) into Node 24 early. Node 20 is
# deprecated on runners starting June 2, 2026 and removed Sept 16, 2026;
# this flag switches to Node 24 today so we don't eat the deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Enough to let `next build` read module-level env access without crashing.
    # Real secrets go into Vercel; CI only needs placeholders because the
    # pipeline doesn't touch the real DB or Redis.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
      AUTH_SECRET: "ci-placeholder-secret-do-not-use-in-prod"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint flat config)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npx vitest run

      - name: Build (Next.js)
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20

    # Skipped unless the DATABASE_URL secret is configured. E2E hits a real
    # Neon branch so results match production behaviour; we gate on the secret
    # to avoid firing against prod or failing on forks without access.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Skip if E2E secrets are unset
        id: gate
        run: |
          if [ -z "${{ secrets.E2E_DATABASE_URL }}" ]; then
            echo "E2E secrets not configured — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.gate.outputs.skip != 'true'
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        if: steps.gate.outputs.skip != 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
