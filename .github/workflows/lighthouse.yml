name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same PR
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    name: Lighthouse CI · Performance + A11y + SEO
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Match CI placeholder env so next build doesn't read real prod secrets.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
      AUTH_SECRET: "ci-placeholder-secret-do-not-use-in-prod"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js)
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          # LHCI uploads results to temporary-public-storage by default;
          # token only needed if upgrading to Lighthouse CI server.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
